name: Build and publish a Docker image to ghcr.io

on:
  release:
    types:
      - published
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  extract_metadata:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}
      attestation_supported: ${{ steps.attestation_check.outputs.supported }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if attestations are supported
        id: attestation_check
        run: |
          if [[ "${{ github.event.repository.visibility }}" == "public" ]] || [[ "${{ github.repository_owner }}" == "enterprise-cloud-org" ]]; then
            echo "supported=true" >> "$GITHUB_OUTPUT"
          else
            echo "supported=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=alpha,enable=${{ github.event.release.prerelease == true && contains(github.event.release.tag_name, '-alpha.') }}
            type=raw,value=beta,enable=${{ github.event.release.prerelease == true && contains(github.event.release.tag_name, '-beta.') }}
            type=raw,value=dev,enable=${{ github.event.release.prerelease == true && contains(github.event.release.tag_name, '-dev.') }}
            type=raw,value=latest,enable=${{ github.event.release.prerelease == false }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          labels: |
            org.opencontainers.image.title=${{ github.repository }}
            org.opencontainers.image.description=${{ github.event.repository.description || 'No repository description provided' }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}

  docker_publish:
    needs: extract_metadata
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ needs.extract_metadata.outputs.tags }}
          labels: ${{ needs.extract_metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: ${{ needs.extract_metadata.outputs.attestation_supported }}
          sbom: ${{ needs.extract_metadata.outputs.attestation_supported }}

      - name: Generate build attestation
        if: ${{ needs.extract_metadata.outputs.attestation_supported == 'true' }}
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  notify:
    needs: docker_publish
    if: always() && github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Send kChat notification
        continue-on-error: true
        env:
          KCHAT_WEBHOOK_URL: ${{ secrets.KCHAT_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.event.release.tag_name }}
          SHA: ${{ github.sha }}
          BUILD_RESULT: ${{ needs.docker_publish.result }}
        run: |
          if [[ -z "$KCHAT_WEBHOOK_URL" ]]; then
            echo "kChat notification skipped: KCHAT_WEBHOOK_URL secret not set"
            exit 0
          fi

          if [[ "$BUILD_RESULT" == "success" ]]; then
            EMOJI="✅"
            MESSAGE="Docker image build completed successfully"
          else
            EMOJI="❌"
            MESSAGE="Docker image build failed"
          fi

          PAYLOAD=$(jq -n \
            --arg emoji "$EMOJI" \
            --arg message "$MESSAGE" \
            --arg repo "$REPO" \
            --arg tag "$TAG" \
            --arg sha "$SHA" \
            --arg status "$BUILD_RESULT" \
            '{ text: "\($emoji) \($message)\n\nRepository: \($repo)\nTag: \($tag)\nCommit: \($sha)\nStatus: \($status)" }')

          curl --fail --silent --show-error --connect-timeout 10 --max-time 30 -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$KCHAT_WEBHOOK_URL"

      - name: Dispatch renovate-run to swarm
        if: needs.docker_publish.result == 'success'
        continue-on-error: true
        env:
          SWARM_DISPATCH_TOKEN: ${{ secrets.SWARM_REPOSITORY_DISPATCH_TOKEN }}
          SOURCE_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
        run: |
          if [[ -z "$SWARM_DISPATCH_TOKEN" ]]; then
            echo "Dispatch skipped: SWARM_REPOSITORY_DISPATCH_TOKEN secret not set"
            exit 0
          fi

          PAYLOAD=$(jq -n \
            --arg source_repo "$SOURCE_REPO" \
            --arg release_tag "$RELEASE_TAG" \
            --arg commit_sha "$COMMIT_SHA" \
            --arg run_id "$RUN_ID" \
            '{ event_type: "renovate-run", client_payload: { source_repository: $source_repo, release_tag: $release_tag, commit_sha: $commit_sha, run_id: $run_id } }')

          curl --fail --silent --show-error --connect-timeout 10 --max-time 30 -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $SWARM_DISPATCH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://api.github.com/repos/digitalygo/swarm/dispatches"
